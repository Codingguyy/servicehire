version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: smart-leads-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    env_file: .env
    networks:
      - app-net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: smart-leads-frontend
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - backend
    networks:
      - app-net

networks:
  app-net:
    driver: bridge
